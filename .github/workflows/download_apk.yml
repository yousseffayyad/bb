name: Download APK and Push to Supabase

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android package name'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Clone gplay-downloader
        run: git clone https://github.com/alltechdev/gplay-apk-downloader .

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase

      - name: Download APK
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        run: |
          mkdir -p output
          python download.py \
            --package "${{ github.event.inputs.package_name }}" \
            --output ./output/ \
          || echo "⚠️ Download may have failed"

      - name: List output files
        run: ls -lah ./output || echo "No files found"

      - name: Upload APK to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: |
          python - <<EOF
          import os
          from supabase import create_client

          supabase_url = os.environ.get("SUPABASE_URL")
          supabase_key = os.environ.get("SUPABASE_SERVICE_KEY")
          package_name = os.environ.get("PACKAGE_NAME")

          client = create_client(supabase_url, supabase_key)

          output_dir = "./output"
          bucket_name = "apk-files"

          files = [f for f in os.listdir(output_dir) if f.endswith(".apk")]

          if not files:
              print("❌ No APK files found, skipping upload")
              exit(0)

          for filename in files:
              file_path = os.path.join(output_dir, filename)

              with open(file_path, "rb") as f:
                  data = f.read()

              # 🔥 organize by package name
              storage_path = f"{package_name}/{filename}"

              res = client.storage.from_(bucket_name).upload(
                  storage_path,
                  data,
                  {"upsert": True}
              )

              print(f"✅ Uploaded {storage_path}: {res}")
          EOF

      - name: Upload APK artifact to GitHub (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}
          path: ./output/
          if-no-files-found: warn
          retention-days: 1