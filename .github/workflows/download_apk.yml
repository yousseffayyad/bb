name: Download APK and Push to Supabase

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android package name'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install gplaycli and supabase
        run: |
          pip install gplaycli supabase

      - name: Download APK with gplaycli
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        run: |
          mkdir -p ./apk_output
          gplaycli -p ${{ github.event.inputs.package_name }} \
            -d ./apk_output/ \
            -e "$GOOGLE_EMAIL" \
            -pss "$GOOGLE_PASSWORD"

      - name: Upload APK to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: |
          python - <<EOF
          import os
          from pathlib import Path
          from supabase import create_client

          client = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          
          apk_files = list(Path("./apk_output").glob("*.apk"))
          if not apk_files:
              print("No APK files found")
              exit(0)
          
          for apk_path in apk_files:
              with open(apk_path, "rb") as f:
                  client.storage.from_("apk-files").upload(
                      f"{os.environ['PACKAGE_NAME']}/{apk_path.name}",
                      f.read(),
                      {"upsert": True}
                  )
              print(f"✅ Uploaded {apk_path.name}")
          EOF