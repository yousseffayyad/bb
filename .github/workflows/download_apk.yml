name: Download APK with Raccoon and Push to Supabase

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android package name (e.g., com.facebook.katana)'
        required: true
        type: string
      country_code:
        description: 'Country code (US, GB, JP, etc.)'
        required: false
        type: string
        default: 'US'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Xvfb (Virtual Display) and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget

      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure Raccoon JAR exists
        run: |
          echo "📦 Checking tools folder"
          ls -la tools/
          du -h tools/raccoon-4.24.0.jar || true
          
          if [ ! -s tools/raccoon-4.24.0.jar ]; then
            echo "⚠️ Raccoon JAR missing or empty — downloading via raw URL"
            curl -L -o tools/raccoon-4.24.0.jar \
              https://raw.githubusercontent.com/yousseffayyad/bb/dev/tools/raccoon-4.24.0.jar
          fi
          
          if [ ! -s tools/raccoon-4.24.0.jar ]; then
            echo "❌ Failed to get Raccoon JAR"
            exit 1
          fi
          
          echo "✅ Raccoon JAR ready:"
          ls -lah tools/raccoon-4.24.0.jar
    
      - name: Create output directory
        run: mkdir -p ./apk_output

      - name: Create Raccoon configuration
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
          COUNTRY_CODE: ${{ github.event.inputs.country_code }}
        run: |
          mkdir -p ~/.config/raccoon
          cat > ~/.config/raccoon/config.properties << EOF
          # Raccoon Configuration
          account.email=${GOOGLE_EMAIL}
          account.password=${GOOGLE_PASSWORD}
          download.dir=${PWD}/apk_output
          device.country=${COUNTRY_CODE}
          device.language=en
          device.sdk=29
          device.name=Pixel_4
          EOF
          
          echo "✅ Raccoon configuration created"
          cat ~/.config/raccoon/config.properties

      - name: Download APK with Raccoon (Headless)
        run: |
          # Use the committed JAR path
          RACOON_JAR=tools/raccoon-4.24.0.jar
      
          if [ ! -f "$RACOON_JAR" ]; then
          echo "❌ Raccoon JAR not found at $RACOON_JAR"
          exit 1
          fi
          
          # Run Raccoon with Xvfb (virtual display)
          xvfb-run -a java -jar "$RACOON_JAR" \
            --download \
            --package ${{ github.event.inputs.package_name }} \
            --output ./apk_output/
          
          # Wait for download to complete
          sleep 10
          
          echo "✅ Download attempt completed"

      - name: Verify download
        run: |
          echo "Searching for APK files..."
          find ./apk_output -name "*.apk" -type f
          
          if [ -z "$(find ./apk_output -name '*.apk' -type f)" ]; then
            echo "⚠️ No APK files downloaded"
            echo "Directory contents:"
            ls -la ./apk_output/ || echo "Directory empty"
            exit 1
          else
            echo "✅ Downloaded APK(s):"
            ls -lah ./apk_output/*.apk 2>/dev/null || ls -lah ./apk_output/**/*.apk 2>/dev/null
          fi

      - name: Upload APK to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: |
          python - <<EOF
          import os
          from pathlib import Path
          from supabase import create_client

          # Initialize Supabase client
          supabase = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_KEY"]
          )
          
          # Find APK file (search recursively)
          apk_files = list(Path("./apk_output").rglob("*.apk"))
          
          if not apk_files:
              print("❌ No APK files found")
              exit(1)
          
          apk_path = apk_files[0]
          package_name = os.environ["PACKAGE_NAME"]
          storage_path = f"{package_name}/{apk_path.name}"
          
          # Ensure bucket exists
          bucket_name = "apk-files"
          try:
              supabase.storage.create_bucket(bucket_name, {"public": False})
              print(f"📦 Created bucket: {bucket_name}")
          except Exception as e:
              print(f"📦 Bucket likely exists: {e}")
          
          # Upload to Supabase Storage
          with open(apk_path, "rb") as f:
              file_data = f.read()
          
          try:
              supabase.storage.from_(bucket_name).upload(
                  storage_path,
                  file_data,
                  {"upsert": True}
              )
              print(f"✅ Uploaded {apk_path.name} to {storage_path}")
              print(f"📊 File size: {len(file_data):,} bytes")
          except Exception as e:
              print(f"⚠️ Upload error: {e}")
              # Try alternative upload method
              supabase.storage.from_(bucket_name).remove([storage_path])
              supabase.storage.from_(bucket_name).upload(storage_path, file_data)
              print(f"✅ Re-uploaded {apk_path.name}")
          EOF

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}
          path: |
            ./apk_output/*.apk
            ./apk_output/**/*.apk
          if-no-files-found: warn
          retention-days: 3

      - name: Cleanup
        if: always()
        run: |
          echo "📊 Download directory contents:"
          tree ./apk_output/ || ls -laR ./apk_output/