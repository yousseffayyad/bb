name: Download APK and Push to Supabase

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android package name'
        required: true
        type: string
      country_code:
        description: 'Country code (US, GB, JP, etc.)'
        required: false
        type: string
        default: 'US'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install gplaycli and supabase
        run: |
          pip install --upgrade pip
          pip install "protobuf==3.20.3"
          pip install gplaycli
          pip install supabase

      - name: Create output directory
        run: mkdir -p ./apk_output

      - name: Create gplaycli config file
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        run: |
          mkdir -p ~/.config/gplaycli
          cat > ~/.config/gplaycli/gplaycli.conf << EOF
          
          # Write config directly with expanded variables
          echo "[Credentials]" > ~/.config/gplaycli/gplaycli.conf
          echo "token = False" >> ~/.config/gplaycli/gplaycli.conf
          echo "gmail_address = ${GOOGLE_EMAIL}" >> ~/.config/gplaycli/gplaycli.conf
          echo "gmail_password = ${GOOGLE_PASSWORD}" >> ~/.config/gplaycli/gplaycli.conf
          echo "" >> ~/.config/gplaycli/gplaycli.conf
          echo "[Cache]" >> ~/.config/gplaycli/gplaycli.conf
          echo "token = ~/.cache/gplaycli/token" >> ~/.config/gplaycli/gplaycli.conf
          echo "" >> ~/.config/gplaycli/gplaycli.conf
          echo "[Locale]" >> ~/.config/gplaycli/gplaycli.conf
          echo "locale = en_US" >> ~/.config/gplaycli/gplaycli.conf
          echo "timezone = UTC" >> ~/.config/gplaycli/gplaycli.conf
          
          # Place in current directory (top priority)
          cp gplaycli.conf ./gplaycli.conf
          
          # Place in ~/.config/gplaycli/
          mkdir -p ~/.config/gplaycli
          cp gplaycli.conf ~/.config/gplaycli/gplaycli.conf
          
          # Place in ~/.local/etc/gplaycli/ (where error shows it's looking)
          mkdir -p ~/.local/etc/gplaycli
          cp gplaycli.conf ~/.local/etc/gplaycli/gplaycli.conf
          
          echo "✅ Config files created in multiple locations"
          echo "File contents:"
          cat ./gplaycli.conf

      - name: Download APK
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          gplaycli \
          -d ${{ github.event.inputs.package_name }} \
          -f ./apk_output/ \
          -c ./gplaycli.conf \
          -p \
          -v

      - name: Verify download
        run: |
          if [ -z "$(ls -A ./apk_output/)" ]; then
            echo "⚠️ No APK files downloaded"
            exit 1
          else
            echo "✅ Downloaded:"
            ls -lah ./apk_output/
          fi

      - name: Upload APK to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: |
          python - <<EOF
          import os
          from pathlib import Path
          from supabase import create_client

          # Initialize Supabase client
          supabase = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_KEY"]
          )
          
          # Find APK file
          apk_files = list(Path("./apk_output").glob("*.apk"))
          if not apk_files:
              print("No APK files found")
              exit(1)
          
          apk_path = apk_files[0]
          package_name = os.environ["PACKAGE_NAME"]
          storage_path = f"{package_name}/{apk_path.name}"
          
          # Ensure bucket exists
          bucket_name = "apk-files"
          try:
              supabase.storage.create_bucket(bucket_name, {"public": False})
              print(f"📦 Created bucket: {bucket_name}")
          except Exception as e:
              print(f"📦 Bucket likely exists: {e}")
          
          # Upload to Supabase Storage
          with open(apk_path, "rb") as f:
              supabase.storage.from_(bucket_name).upload(
                  storage_path,
                  f.read(),
                  {"upsert": True}
              )
          
          print(f"✅ Uploaded {apk_path.name} to {storage_path}")
          EOF

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}
          path: ./apk_output/
          if-no-files-found: error